function buildPrompt(ch,{draft,contentType,goal,tone,globalRules,chRules,ragRefs,selTags,prompts}){
  const tmpl=prompts[ch]||PROMPTS[ch]||"{{draft}}를 변환";
  const gR=globalRules.filter(r=>r.enabled).map(r=>`• ${r.text}`).join("\n");
  const cR=(chRules[ch]||[]).filter(r=>r.enabled).map(r=>`• ${r.text}`).join("\n");
  const rules=[gR,cR].filter(Boolean).join("\n");
  const active=ragRefs.filter(r=>selTags.length===0||r.tags.some(t=>selTags.includes(t)));
  const rag=active.length>0?`\n참고 자료:\n${active.map(r=>`[${r.title}] ${r.content}`).join("\n")}`:"";
  const rb=rules?`\n준수 규칙:\n${rules}`:"";
  return tmpl.replace("{{draft}}",draft).replace("{{contentType}}",contentType).replace("{{goal}}",goal).replace("{{tone}}",tone)+rag+rb;
}

async function callAI(prompt, retryCount=0){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),60000);
  let res;
  try{
    res=await fetch("/api/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt}),
      signal:controller.signal
    });
  }catch(e){
    clearTimeout(timer);
    if(e.name==="AbortError") throw new Error("시간 초과. 다시 시도해주세요.");
    throw e;
  }
  clearTimeout(timer);
  if(res.status===429){
    if(retryCount<3){
      const wait=Math.pow(2,retryCount)*5000;
      await new Promise(r=>setTimeout(r,wait));
      return callAI(prompt, retryCount+1);
    }
    throw new Error("요청 한도 초과. 잠시 후 다시 시도해주세요.");
  }
  if(!res.ok){const t=await res.text().catch(()=>"");throw new Error(`API 오류 ${res.status}: ${t.slice(0,100)}`);}
  const data=await res.json();
  if(data.error) throw new Error(data.error||"API 오류");
  return data.content||"결과 없음";
}

// ─── 비밀번호 화면
function PasswordGate({onUnlock}){
  const [pw,setPw]=React.useState("");
  const [shake,setShake]=React.useState(false);
  const [err,setErr]=React.useState("");
  const attempt=()=>{
    if(pw===PASSWORD){onUnlock();}
    else{setShake(true);setErr("비밀번호가 올바르지 않습니다.");setTimeout(()=>setShake(false),500);setPw("");}
  };
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div className="fadeUp" style={{background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:"48px 40px",width:400,maxWidth:"90vw",boxShadow:"0 4px 24px rgba(124,58,237,0.08)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:52,height:52,background:C.primaryBg,borderRadius:14,marginBottom:16}}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path d="M13 2L4.5 13.5H12L11 22L19.5 10.5H12L13 2Z" stroke={C.primary} strokeWidth="1.8" strokeLinejoin="round"/>
            </svg>
          </div>
          <div style={{fontWeight:700,fontSize:20,color:C.text,letterSpacing:"-0.3px"}}>CMAS</div>
          <div style={{fontSize:13,color:C.textSub,marginTop:4}}>콘텐츠 다목적 자동화 시스템</div>
          <div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:5,background:C.primaryBg,padding:"4px 10px",borderRadius:20}}>
            <span style={{fontSize:11,color:C.primary,fontWeight:600}}>Powered by Gemini 2.0 Flash</span>
          </div>
        </div>
        <div style={{borderTop:`1px solid ${C.border}`,marginBottom:28}}/>
        <div style={{marginBottom:6,fontSize:13,fontWeight:500,color:C.textMd}}>팀 비밀번호</div>
        <div className={shake?"shake":""}>
          <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&attempt()}
            placeholder="비밀번호를 입력하세요"
            style={{width:"100%",padding:"11px 14px",border:`1.5px solid ${err?C.red:C.border}`,borderRadius:8,fontSize:14,color:C.text,background:C.white,transition:"all 0.2s",marginBottom:err?6:16,boxSizing:"border-box"}}
            autoFocus/>
          {err&&<div style={{fontSize:12,color:C.red,marginBottom:12}}>⚠ {err}</div>}
        </div>
        <button onClick={attempt}
          style={{width:"100%",padding:"12px",background:C.primary,color:"#fff",borderRadius:8,fontSize:14,fontWeight:600,transition:"all 0.15s",boxShadow:"0 2px 8px rgba(124,58,237,0.25)"}}>
          입장하기 →
        </button>
        <div style={{textAlign:"center",marginTop:20,fontSize:12,color:C.textHint}}>비밀번호가 없으시면 팀 관리자에게 문의하세요</div>
      </div>
    </div>
  );
}

                  ))}
                  <div style={{border:`1.5px dashed ${C.border}`,borderRadius:8,padding:10,marginTop:4}}>
                    <textarea value={newGR} onChange={e=>setNewGR(e.target.value)} placeholder="새 전역 규칙 입력..." style={{width:"100%",height:44,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 9px",color:C.text,resize:"none",lineHeight:1.5,marginBottom:7}}/>
                    <button onClick={()=>{if(!newGR.trim())return;setGlobalRules(p=>[...p,{id:`g${Date.now()}`,text:newGR,enabled:true}]);setNewGR("");addLog("규칙 추가","success");}} style={{width:"100%",padding:"7px",background:C.primary,borderRadius:6,color:"#fff",fontWeight:600,fontSize:12}}>추가</button>
                  </div>
                </>
              )}
              {ruleTab==="채널"&&(
                <>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                    {channels.map(ch=>(
                      <button key={ch} onClick={()=>setActiveTab(ch)} style={{padding:"4px 10px",borderRadius:20,fontSize:11,background:activeTab===ch?C.primaryBg:C.surface,color:activeTab===ch?C.primary:C.textSub,border:`1px solid ${activeTab===ch?C.primary:C.border}`,fontWeight:activeTab===ch?600:400}}>{ch}</button>
                    ))}
                  </div>
                  <div style={{fontSize:11,fontWeight:600,color:C.textSub,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:9}}>{activeTab} 규칙</div>
                  {(chRules[activeTab]||[]).map(rule=>(
                    <div key={rule.id} style={{border:`1px solid ${C.border}`,borderRadius:8,marginBottom:6,overflow:"hidden"}}>
                      {editRId===rule.id?(
                        <div style={{padding:10}}>
                          <textarea value={editRTxt} onChange={e=>setEditRTxt(e.target.value)} style={{width:"100%",height:44,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 9px",color:C.text,resize:"none",lineHeight:1.5,marginBottom:7}}/>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>{setChRules(p=>({...p,[activeTab]:(p[activeTab]||[]).map(r=>r.id===editRId?{...r,text:editRTxt}:r)}));setEditRId(null);}} style={{flex:1,padding:"5px",fontSize:11,background:C.greenBg,border:`1px solid #6EE7B7`,borderRadius:6,color:C.green,fontWeight:600}}>저장</button>
                            <button onClick={()=>setEditRId(null)} style={{padding:"5px 10px",fontSize:11,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.textSub}}>취소</button>
                          </div>
                        </div>
                      ):(
                        <div style={{display:"flex",alignItems:"flex-start",gap:9,padding:"10px 12px"}}>
                          <Toggle on={rule.enabled} onClick={()=>setChRules(p=>({...p,[activeTab]:(p[activeTab]||[]).map(r=>r.id===rule.id?{...r,enabled:!r.enabled}:r)}))} accent={C.blue}/>
                          <span style={{fontSize:12,color:rule.enabled?C.text:C.textHint,lineHeight:1.5,flex:1}}>{rule.text}</span>
                          <div style={{display:"flex",gap:4}}>
                            <button onClick={()=>{setEditRId(rule.id);setEditRTxt(rule.text);}} style={{fontSize:12,color:C.textSub,background:"none",padding:"1px 3px"}}>✎</button>
                            <button onClick={()=>setChRules(p=>({...p,[activeTab]:(p[activeTab]||[]).filter(r=>r.id!==rule.id)}))} style={{fontSize:12,color:C.textSub,background:"none",padding:"1px 3px"}}>×</button>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                  <div style={{display:"flex",gap:6,marginTop:8}}>
                    <input value={newCR} onChange={e=>setNewCR(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter"&&newCR.trim()){setChRules(p=>({...p,[activeTab]:[...(p[activeTab]||[]),{id:`c${Date.now()}`,text:newCR,enabled:true}]}));setNewCR("");addLog(`${activeTab} 규칙 추가`,"success");}}}
                      placeholder="규칙 입력 후 Enter" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",color:C.text}}/>
                    <button onClick={()=>{if(!newCR.trim())return;setChRules(p=>({...p,[activeTab]:[...(p[activeTab]||[]),{id:`c${Date.now()}`,text:newCR,enabled:true}]}));setNewCR("");}} style={{padding:"7px 12px",background:C.blue,borderRadius:7,color:"#fff",fontWeight:600,fontSize:13}}>+</button>
                  </div>
                </>
              )}
            </div>
          )}

          {/* RAG 패널 */}
          {rightPanel==="rag"&&(
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.textSub,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:9}}>태그 필터</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
                {allTags.map(tag=>(
                  <button key={tag} onClick={()=>setSelTags(p=>p.includes(tag)?p.filter(x=>x!==tag):[...p,tag])}
                    style={{padding:"4px 10px",borderRadius:20,fontSize:11,background:selTags.includes(tag)?C.primaryBg:C.surface,color:selTags.includes(tag)?C.primary:C.textSub,border:`1px solid ${selTags.includes(tag)?C.primary:C.border}`,fontWeight:selTags.includes(tag)?600:400,cursor:"pointer"}}>
                    {tag}
                  </button>
                ))}
                {selTags.length>0&&<button onClick={()=>setSelTags([])} style={{padding:"4px 10px",borderRadius:20,fontSize:11,background:C.surface,color:C.textSub,border:`1px solid ${C.border}`,cursor:"pointer"}}>초기화</button>}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <div style={{fontSize:11,fontWeight:600,color:C.textSub,textTransform:"uppercase",letterSpacing:"0.05em"}}>참고자료 ({ragRefs.filter(r=>selTags.length===0||r.tags.some(t=>selTags.includes(t))).length}개)</div>
                <button onClick={()=>setShowAddRag(p=>!p)} style={{fontSize:11,padding:"3px 9px",background:showAddRag?C.primaryBg:C.surface,border:`1px solid ${showAddRag?C.primary:C.border}`,borderRadius:6,color:showAddRag?C.primary:C.textSub,cursor:"pointer"}}>{showAddRag?"취소":"+ 추가"}</button>
              </div>
              {showAddRag&&(
                <div style={{background:C.primaryBg,border:`1px solid rgba(124,58,237,0.2)`,borderRadius:10,padding:12,marginBottom:12}}>
                  <input value={newRag.title} onChange={e=>setNewRag(p=>({...p,title:e.target.value}))} placeholder="제목" style={{width:"100%",background:C.white,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,marginBottom:7}}/>
                  <textarea value={newRag.content} onChange={e=>setNewRag(p=>({...p,content:e.target.value}))} placeholder="내용, 예시, 가이드라인..." style={{width:"100%",height:72,background:C.white,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,resize:"none",lineHeight:1.6,marginBottom:7}}/>
                  <input value={newRag.tags} onChange={e=>setNewRag(p=>({...p,tags:e.target.value}))} placeholder="태그 (쉼표 구분)" style={{width:"100%",background:C.white,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,marginBottom:9}}/>
                  <button onClick={()=>{if(!newRag.title.trim())return;const tags=newRag.tags.split(",").map(t=>t.trim()).filter(Boolean);setRagRefs(p=>[...p,{id:`r${Date.now()}`,title:newRag.title,content:newRag.content,tags,preview:newRag.content.slice(0,70)+"...",isHighPerf:false}]);setNewRag({title:"",content:"",tags:""});setShowAddRag(false);addLog("참고자료 추가","success");}} style={{width:"100%",padding:"8px",background:C.primary,borderRadius:7,color:"#fff",fontSize:12,fontWeight:600}}>저장</button>
                </div>
              )}
              {ragRefs.filter(r=>selTags.length===0||r.tags.some(t=>selTags.includes(t))).map(ref=>(
                <div key={ref.id} style={{background:C.white,border:`1px solid ${ref.isHighPerf?"#FCD34D":C.border}`,borderRadius:10,padding:12,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.text,display:"flex",gap:6,alignItems:"center"}}>{ref.isHighPerf&&<span style={{color:"#D97706"}}>★</span>}{ref.title}</div>
                    <button onClick={()=>setRagRefs(p=>p.filter(r=>r.id!==ref.id))} style={{fontSize:13,color:C.textHint,background:"none",marginLeft:6,padding:"0 2px"}}>×</button>
                  </div>
                  <div style={{fontSize:11,color:C.textSub,marginBottom:7,lineHeight:1.5}}>{ref.preview}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {ref.tags.map(tag=><span key={tag} style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:C.surface,color:C.textSub,border:`1px solid ${C.border}`}}>{tag}</span>)}
                    {ref.isHighPerf&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:C.amberBg,color:C.amber,border:`1px solid #FCD34D`}}>고성과</span>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* 프롬프트 패널 */}
          {rightPanel==="prompts"&&(
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.textSub,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:9}}>채널 프롬프트 편집</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
                {channels.map(ch=>(
                  <button key={ch} onClick={()=>{setEditCh(ch);setEditTmpl(prompts[ch]||"");setShowPV(false);}}
                    style={{padding:"4px 10px",borderRadius:20,fontSize:11,background:editCh===ch?C.primaryBg:C.surface,color:editCh===ch?C.primary:C.textSub,border:`1px solid ${editCh===ch?C.primary:C.border}`,fontWeight:editCh===ch?600:400,cursor:"pointer"}}>{ch}</button>
                ))}
              </div>
              {editCh&&(
                <>
                  <div style={{fontSize:11,fontWeight:500,color:C.textSub,marginBottom:7}}>편집 중: <strong style={{color:C.primary}}>{editCh}</strong></div>
                  <textarea value={editTmpl} onChange={e=>setEditTmpl(e.target.value)} style={{width:"100%",height:210,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:12,color:C.textMd,fontSize:11.5,lineHeight:1.7,resize:"none",fontFamily:"monospace",marginBottom:9}}
                    onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
                  <div style={{display:"flex",gap:7,marginBottom:10}}>
                    <button onClick={()=>{const ver={id:`pv${Date.now()}`,template:editTmpl,note:`버전 ${(promptVers[editCh]||[]).length+1}`,ts:new Date().toISOString()};setPromptVers(p=>({...p,[editCh]:[ver,...(p[editCh]||[])]}));setPrompts(p=>({...p,[editCh]:editTmpl}));addLog(`${editCh} 프롬프트 저장`,"success");}}
                      style={{flex:1,padding:"8px",background:C.primary,borderRadius:8,color:"#fff",fontSize:12,fontWeight:600}}>
                      저장 (버전 {(promptVers[editCh]||[]).length+1})
                    </button>
                    <button onClick={()=>setShowPV(p=>!p)} style={{padding:"8px 12px",background:showPV?C.primaryBg:C.surface,border:`1px solid ${showPV?C.primary:C.border}`,borderRadius:8,color:showPV?C.primary:C.textSub,fontSize:12}}>기록 ({(promptVers[editCh]||[]).length})</button>
                  </div>
                  {showPV&&(promptVers[editCh]||[]).length>0&&(
                    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:10,marginBottom:10}}>
                      {(promptVers[editCh]||[]).map((v,i)=>(
                        <div key={v.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 7px",borderRadius:6,marginBottom:2}}>
                          <div style={{flex:1}}><div style={{fontSize:12,color:C.text,fontWeight:500}}>{v.note}</div><div style={{fontSize:11,color:C.textSub}}>{new Date(v.ts).toLocaleDateString("ko-KR")}</div></div>
                          {i===0?<Badge color={C.green} bg={C.greenBg}>현재</Badge>
                            :<button onClick={()=>{setEditTmpl(v.template);setPrompts(p=>({...p,[editCh]:v.template}));addLog(`${editCh} 복원`);}} style={{fontSize:11,padding:"3px 8px",background:C.white,border:`1px solid ${C.border}`,borderRadius:6,color:C.textSub}}>복원</button>}
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{background:C.surface,borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:11,fontWeight:500,color:C.textSub,marginBottom:7}}>사용 가능한 변수</div>
                    {["{{draft}}","{{contentType}}","{{goal}}","{{tone}}"].map(v=>(
                      <span key={v} style={{fontSize:11,color:C.primary,background:C.primaryBg,padding:"2px 7px",borderRadius:5,marginRight:5,marginBottom:4,display:"inline-block",fontFamily:"monospace"}}>{v}</span>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}

          {/* 로그 패널 */}
          {rightPanel==="log"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:600,color:C.textSub,textTransform:"uppercase",letterSpacing:"0.05em"}}>활동 로그 ({log.length})</div>
                <button onClick={()=>setLog([])} style={{fontSize:11,padding:"3px 8px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.textSub,cursor:"pointer"}}>초기화</button>
              </div>
              {log.map(e=>(
                <div key={e.id} style={{display:"flex",gap:9,paddingBottom:8,marginBottom:8,borderBottom:`1px solid ${C.surface}`}}>
                  <span style={{fontSize:10,color:C.textHint,fontFamily:"monospace",minWidth:52,flexShrink:0,paddingTop:1}}>{e.time}</span>
                  <span style={{fontSize:12,color:e.type==="error"?C.red:e.type==="success"?C.green:e.type==="warn"?C.amber:C.textSub,lineHeight:1.5}}>{e.msg}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{padding:"9px 14px",borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8,background:C.surface}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:C.green,animation:"pulse 3s infinite"}}/>
          <span style={{fontSize:11,color:C.textSub}}>출력 {Object.keys(outputs).length}개 · {goal} → {goalData.group}</span>
          <span style={{marginLeft:"auto",fontSize:11,color:C.textHint}}>{contentType}</span>
        </div>
      </div>

      {/* 고성과 모달 */}
      {starModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,backdropFilter:"blur(2px)"}}>
          <div style={{background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:28,width:440,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.12)"}}>
            <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:4}}>★ 고성과 콘텐츠 태깅</div>
            <div style={{fontSize:13,color:C.textSub,marginBottom:14}}>이 콘텐츠를 고성과로 표시하고 RAG 참고자료에 자동 저장합니다.</div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:12,marginBottom:14,maxHeight:80,overflowY:"auto"}}>
              <div style={{fontSize:12,color:C.textMd,lineHeight:1.6,fontFamily:"monospace"}}>{starModal.content.slice(0,160)}...</div>
            </div>
            <Lbl c="참고자료 제목 (선택)"/>
            <input value={starNote} onChange={e=>setStarNote(e.target.value)} placeholder={`${starModal.channel} 고성과 — ${new Date().toLocaleDateString("ko-KR")}`}
              style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,marginBottom:12}}
              onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
            <Lbl c="추가 태그 (쉼표 구분)"/>
            <input value={starTags} onChange={e=>setStarTags(e.target.value)} placeholder="예: q4-2024, 캠페인A"
              style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,marginBottom:18}}
              onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
            <div style={{display:"flex",gap:9}}>
              <button onClick={()=>{const tags=starTags.split(",").map(t=>t.trim()).filter(Boolean);setRagRefs(p=>[...p,{id:`r${Date.now()}`,title:starNote||`${starModal.channel} 고성과`,content:starModal.content,tags:[...tags,starModal.channel.toLowerCase(),"고성과"],preview:starModal.content.slice(0,70)+"...",isHighPerf:true}]);setOutputs(p=>({...p,[starModal.channel]:{...p[starModal.channel],starred:true}}));addLog(`${starModal.channel} → RAG 저장`,"success");setStarModal(null);}}
                style={{flex:1,padding:"11px",background:C.primary,borderRadius:9,color:"#fff",fontWeight:600,fontSize:13,boxShadow:"0 2px 8px rgba(124,58,237,0.25)"}}>★ RAG에 저장</button>
              <button onClick={()=>setStarModal(null)} style={{padding:"11px 18px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,color:C.textSub,fontSize:13}}>취소</button>
            </div>
          </div>
        </div>
      )}

      {/* 내보내기 모달 */}
      {exportModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,backdropFilter:"blur(2px)"}}>
          <div style={{background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:28,width:340,boxShadow:"0 8px 32px rgba(0,0,0,0.12)"}}>
            <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:4}}>콘텐츠 내보내기</div>
            <div style={{fontSize:13,color:C.textSub,marginBottom:18}}>{exportModal} — {contentType}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {[["copy","📋  클립보드 복사","복사"],["markdown","⬇  Markdown 다운로드",".md"],["txt","⬇  텍스트 다운로드",".txt"]].map(([fmt,label,ext])=>(
                <button key={fmt} onClick={()=>{exportContent(exportModal,fmt);if(fmt!=="copy")setExportModal(null);}}
                  style={{width:"100%",padding:"12px 16px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:13,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                  <span>{label}</span><span style={{fontSize:11,color:C.textHint,fontFamily:"monospace"}}>{ext}</span>
                </button>
              ))}
            </div>
            <button onClick={()=>setExportModal(null)} style={{width:"100%",padding:"10px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,color:C.textSub,fontSize:13}}>닫기</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── 루트
function Root(){
  const [unlocked,setUnlocked]=React.useState(false);
  if(!unlocked) return React.createElement(PasswordGate,{onUnlock:()=>setUnlocked(true)});
  return React.createElement(CMASApp,null);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(Root,null));
</script>
</body>
</html>
